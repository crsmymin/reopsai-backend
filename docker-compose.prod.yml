services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reopsai-backend-prod
    environment:
      FLASK_ENV: production
      ENVIRONMENT: production
      DEBUG: "false"
      PORT: 5001
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      BACKEND_URL: ${BACKEND_URL:?BACKEND_URL is required}
      PERSONA_FIGMA_REDIRECT_URI: ${PERSONA_FIGMA_REDIRECT_URI:-}
      PERSONA_STORAGE_BACKEND: ${PERSONA_STORAGE_BACKEND:-s3}
      PERSONA_STORAGE_LOCAL_DIR: ${PERSONA_STORAGE_LOCAL_DIR:-/app/uploads/persona_assets}
      PERSONA_S3_BUCKET: ${PERSONA_S3_BUCKET:-}
      PERSONA_S3_PREFIX: ${PERSONA_S3_PREFIX:-}
      PERSONA_S3_REGION: ${PERSONA_S3_REGION:-}
      PERSONA_S3_ENDPOINT_URL: ${PERSONA_S3_ENDPOINT_URL:-}
      PERSONA_S3_LOCAL_FALLBACK: ${PERSONA_S3_LOCAL_FALLBACK:-true}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?ALLOWED_ORIGINS is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SQLALCHEMY_ECHO: "false"
      PYTHONUNBUFFERED: "1"
      RAG_DB_PATH: /chroma_db
    ports:
      - "127.0.0.1:5001:5001"
    command: >
      sh -c "
      mkdir -p /app/logs &&
      alembic upgrade head &&
      python scripts/bootstrap_super_admin.py &&
      python scripts/ensure_chroma_db.py &&
      gunicorn --workers 6 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:5001 --access-logfile /app/logs/access.log --error-logfile /app/logs/app.log --capture-output --timeout 120 asgi:application
      "
    volumes:
      - backend_uploads_prod:/app/uploads
      - ./logs:/app/logs
    tmpfs:
      - /chroma_db:size=2g,mode=1777
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/api/auth/test', timeout=3)\""]
      interval: 20s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  backend_uploads_prod:
