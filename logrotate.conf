# ===========================================
# reopsai 로그 로테이션 설정
# 일자별 로그 파일 생성, 60일 보관 후 자동 삭제
#   sudo cp logrotate.conf /etc/logrotate.d/reopsai
#   sudo logrotate -d /etc/logrotate.d/reopsai  (dry-run 테스트)
#
# 로그 파일 종류:
#   access.log   - HTTP 요청/응답 로그 (gunicorn access log)
#   app.log      - 애플리케이션 로그 (LLM 호출, RAG 검색, 토큰 사용량, gunicorn 에러 등)
# ===========================================

/home/ubuntu/reopsai-backend/logs/*.log {
    daily

    rotate 60

    dateext
    dateformat -%Y-%m-%d

    compress
    delaycompress

    missingok

    notifempty

    create 0644 root root

    sharedscripts

    postrotate
        docker kill --signal=USR1 reopsai-backend-prod 2>/dev/null || true
    endscript
}
